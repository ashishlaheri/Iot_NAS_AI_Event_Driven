# ============================================
# IoT-NAS — Docker Compose (Node 1)
# ============================================
# All core services for the IoT-Aware AI Event-Driven NAS
# Run: docker compose up -d
# Verify: docker compose ps

services:
  # ----- Data Stores -----
  redis:
    image: redis:7-alpine
    container_name: iotnas-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: iotnas-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iotnas}
      POSTGRES_USER: ${POSTGRES_USER:-iotnas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iotnas2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iotnas} -d ${POSTGRES_DB:-iotnas}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ----- MQTT Broker -----
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iotnas-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ----- Custom Microservices -----
  queue-api:
    build:
      context: ./services/queue
      dockerfile: Dockerfile
    container_name: iotnas-queue-api
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  inference-api:
    build:
      context: ./services/inference
      dockerfile: Dockerfile
    container_name: iotnas-inference-api
    ports:
      - "8000:8000"
    volumes:
      - inference_models:/app/models
      - inference_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  forensic-api:
    build:
      context: ./services/forensics
      dockerfile: Dockerfile
    container_name: iotnas-forensic-api
    ports:
      - "8002:8002"
    volumes:
      - forensic_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-iotnas}
      - POSTGRES_USER=${POSTGRES_USER:-iotnas}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-iotnas2024}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ----- Workflow Engine -----
  n8n:
    image: n8nio/n8n:latest
    container_name: iotnas-n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-iotnas}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-iotnas}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-iotnas2024}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Kolkata
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      queue-api:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ----- Monitoring -----
  prometheus:
    image: prom/prometheus:latest
    container_name: iotnas-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=1GB'
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: iotnas-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-iotnas2024}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/iot-nas.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/dashboards/iot-nas.json:/var/lib/grafana/dashboards/iot-nas.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ----- Reverse Proxy -----
  nginx:
    image: nginx:alpine
    container_name: iotnas-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - queue-api
      - inference-api
      - forensic-api
      - n8n
      - grafana
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  postgres_data:
  n8n_data:
  prometheus_data:
  grafana_data:
  inference_models:
  inference_uploads:
  forensic_data:
