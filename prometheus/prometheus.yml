# ============================================
# IoT-NAS — Prometheus Scrape Configuration
# ============================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ---- Custom Microservices ----
  - job_name: 'queue-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['queue-api:8001']
        labels:
          service: 'priority-queue'

  - job_name: 'inference-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['inference-api:8000']
        labels:
          service: 'ml-inference'

  - job_name: 'forensic-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['forensic-api:8002']
        labels:
          service: 'forensic-logger'

  # ---- Infrastructure ----
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          instance: 'node1-nas-core'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
