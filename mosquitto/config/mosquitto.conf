# ============================================
# IoT-NAS — Mosquitto MQTT Broker Configuration
# ============================================
# Port 1883: Standard MQTT (IoT devices + simulator)
# Port 9001: WebSocket (n8n MQTT trigger node)

# ---- Global Settings ----
per_listener_settings false
allow_anonymous true

# ---- MQTT Listener ----
listener 1883
protocol mqtt

# ---- WebSocket Listener (for n8n) ----
listener 9001
protocol websockets

# ---- Persistence ----
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ---- Logging ----
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true

# ---- Performance ----
max_inflight_messages 100
max_queued_messages 10000
message_size_limit 1048576
