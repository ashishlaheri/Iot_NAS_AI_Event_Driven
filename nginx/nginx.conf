# ============================================
# IoT-NAS — Nginx Reverse Proxy
# ============================================
# Single entry point on port 80

events {
    worker_connections 256;
}

http {
    # ---- Upstream Services ----
    upstream queue_api {
        server queue-api:8001;
    }
    upstream inference_api {
        server inference-api:8000;
    }
    upstream forensic_api {
        server forensic-api:8002;
    }
    upstream n8n_ui {
        server n8n:5678;
    }
    upstream grafana_ui {
        server grafana:3000;
    }

    server {
        listen 80;
        server_name _;

        # ---- Health Check ----
        location /health {
            return 200 '{"status":"ok","service":"nginx-proxy"}';
            add_header Content-Type application/json;
        }

        # ---- Priority Queue API ----
        location /api/queue/ {
            proxy_pass http://queue_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- Inference API ----
        location /api/infer/ {
            proxy_pass http://inference_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 10m;
        }

        # ---- Forensic Logger API ----
        location /api/forensic/ {
            proxy_pass http://forensic_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- n8n Workflow UI ----
        location /n8n/ {
            proxy_pass http://n8n_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ---- Grafana Dashboard ----
        location /grafana/ {
            proxy_pass http://grafana_ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Default ----
        location / {
            return 200 '{"service":"IoT-NAS Gateway","endpoints":["/api/queue/","/api/infer/","/api/forensic/","/n8n/","/grafana/"]}';
            add_header Content-Type application/json;
        }
    }
}
