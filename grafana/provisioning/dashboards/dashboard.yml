# Auto-provision dashboards from JSON files
apiVersion: 1

providers:
  - name: 'IoT-NAS Dashboards'
    orgId: 1
    folder: 'IoT-NAS'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
